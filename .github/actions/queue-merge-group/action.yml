name: Queue for merge group
description: >
  Waits until all earlier merge_group workflow runs of this workflow complete (or until a specific job within them completes).

inputs:
  job-to-wait-for:
    description: >
      If set, wait only until this named job completes in each blocking run, rather than waiting for the entire run to finish.
    required: false
    default: ''
  poll-interval-seconds:
    description: Seconds to sleep between polling iterations.
    required: false
    default: '30'
  abort-after-seconds:
    description: Maximum seconds to wait before failing.
    required: false
    default: '3600' # 1 hour

runs:
  using: composite
  steps:
  - name: Wait for earlier merge_group runs
    shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      JOB_TO_WAIT_FOR: ${{ inputs.job-to-wait-for }}
      POLL_INTERVAL: ${{ inputs.poll-interval-seconds }}
      ABORT_AFTER_SECONDS: ${{ inputs.abort-after-seconds }}
    run: |
      set -euo pipefail

      DEADLINE=$(( $(date +%s) + ABORT_AFTER_SECONDS ))
      WORKFLOW_NAME=$(gh run view "${GITHUB_RUN_ID}" --json workflowName --jq '.workflowName')

      while true; do
        if [ "$(date +%s)" -ge "$DEADLINE" ]; then
          echo "::error::Timed out after ${ABORT_AFTER_SECONDS}s"
          exit 1
        fi

        BLOCKING_IDS=$(gh run list --workflow "${WORKFLOW_NAME}" --event merge_group --json databaseId,status --limit 100 \
          | jq -r --argjson cur "${GITHUB_RUN_ID}" \
          '[.[] | select(.status == "in_progress" or .status == "queued" or .status == "waiting") | select(.databaseId < $cur)] | .[].databaseId')

        if [ -z "${BLOCKING_IDS}" ]; then
          echo "No earlier merge_group runs are blocking. Proceeding."
          exit 0
        fi

        echo "Blocking run IDs: $(echo "${BLOCKING_IDS}" | tr '\n' ' ')"

        if [ -z "${JOB_TO_WAIT_FOR}" ]; then
          sleep "${POLL_INTERVAL}"
          continue
        fi

        STILL_BLOCKING=false
        while read -r RUN_ID; do
          GH_VIEW_OUT=$(gh run view "${RUN_ID}" --json jobs 2>&1) \
            || { echo "::error::Failed to fetch job status for run ${RUN_ID}: ${GH_VIEW_OUT}"; exit 1; }
          JOB_STATUS=$(echo "${GH_VIEW_OUT}" \
            | jq -r --arg job "${JOB_TO_WAIT_FOR}" \
            '[.jobs[] | select(.name == $job)] | last | .status // "not_found"')
          echo "  Run ${RUN_ID}: job '${JOB_TO_WAIT_FOR}' status = ${JOB_STATUS}"
          if [ "${JOB_STATUS}" != "completed" ]; then
            STILL_BLOCKING=true
          fi
        done <<< "${BLOCKING_IDS}"

        if [ "${STILL_BLOCKING}" = false ]; then
          echo "All blocking runs have completed '${JOB_TO_WAIT_FOR}'. Proceeding."
          exit 0
        fi

        echo "Still waiting... sleeping ${POLL_INTERVAL}s"
        sleep "${POLL_INTERVAL}"
      done
