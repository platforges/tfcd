name: Cancel stale merge queue workflows
on:
  merge_group:
    types: [destroyed]

permissions:
  actions: write
  contents: read

jobs:
  cancel-workflows:
    name: Cancel stale runs out of merge queue
    runs-on: ubuntu-latest
    if: github.event.reason != 'merged'
    steps:
    - name: Cancel stale workflow runs of ${{ github.ref }}
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        workflow_runs=$(gh run list --commit "${{ github.sha }}" --json databaseId,status \
          --jq '[.[] | select(.status != "completed")]' --limit 100)
        current_run_id="${{ github.run_id }}"
        run_count=$(echo "$workflow_runs" | jq 'length')
        echo "Found $run_count active run(s) for SHA ${{ github.sha }}. Current Run ID: $current_run_id"

        echo "$workflow_runs" | jq --raw-output '.[].databaseId' \
        | while read -r run_id; do
          if [ -n "$run_id" ] && [ "$run_id" != "$current_run_id" ]; then
            echo "Cancelling workflow run $run_id"
            gh run cancel "$run_id"
          fi
        done
