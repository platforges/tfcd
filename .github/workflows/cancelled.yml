name: Cancel stale merge queue workflows
on:
  merge_group:
    types: [destroyed]

permissions:
  actions: write
  contents: read

jobs:
  cancel-workflows:
    name: Cancel stale runs out of merge queue
    runs-on: ubuntu-latest
    if: github.event.reason != 'merged'
    steps:
    - name: Cancel stale workflow runs of ${{ github.ref }}
      run: |
        set -euo pipefail

        workflow_runs=$(curl --silent --show-error --fail-with-body --header "Authorization: Bearer ${{ github.token }}" \
          "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=100")
        run_count=$(echo "$workflow_runs" | jq '[.workflow_runs[] | select(.status != "completed")] | length')
        current_run_id="${{ github.run_id }}"
        echo "Found $run_count active run(s) for SHA ${{ github.sha }}. Current Run ID: $current_run_id"

        echo "$workflow_runs" | jq --raw-output '.workflow_runs[] | select(.status != "completed") | .id' \
        | while read -r run_id; do
          if [ -n "$run_id" ] && [ "$run_id" != "$current_run_id" ]; then
            echo "Cancelling workflow run $run_id"
            http_code=$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --header "Authorization: Bearer ${{ github.token }}" \
              --request POST "https://api.github.com/repos/${{ github.repository }}/actions/runs/$run_id/cancel")
            if [ "$http_code" != "202" ]; then
              echo "WARNING: Cancel request for run $run_id returned HTTP $http_code" >&2
            fi
          fi
        done
